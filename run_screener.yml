name: Run Screener Saham IHSG

on:
  schedule:
    # Jam 16:30 WIB = 09:30 UTC, Senin-Jumat (market IHSG tutup 16:00/16:15 WIB)
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}   # supaya bisa di-trigger manual dari tab "Actions"

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jalankan screener
        run: python run_screener.py

      - name: Commit & push hasil
        run: |
          git config user.name "screener-bot"
          git config user.email "screener-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update hasil screening $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
